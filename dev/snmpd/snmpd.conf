# MIB Beacon — spike test agent (net-snmp snmpd)
# NOT for production. Credentials here are deliberately public test values.

agentAddress udp:161

# --- v1 / v2c ---
rocommunity public
rwcommunity private

# --- v3 users spanning the crypto matrix (spike S2/S3) ---
# net-snmp keywords: auth = MD5|SHA|SHA-224|SHA-256|SHA-384|SHA-512
#                    priv = DES|AES (AES-128) | AES-192 | AES-256
createUser spike_sha256_aes128 SHA-256 "authpass_sha256" AES "privpass_aes128"
rouser spike_sha256_aes128 authPriv

createUser spike_md5_des MD5 "authpass_md5xxx" DES "privpass_desxxx"
rouser spike_md5_des authPriv

createUser spike_sha512_aes256 SHA-512 "authpass_sha512" AES-256 "privpass_aes256"
rouser spike_sha512_aes256 authPriv

# --- system group ---
sysDescr "MIB Beacon spike test agent"
sysLocation "lab"
sysContact "spike@mibbeacon.invalid"
sysServices 72

# Expose more of the tree so the walk perf test (S5) has volume to stream.
# host resources + interfaces come from the default agent modules.
