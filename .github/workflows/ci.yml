name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  # Engine spike against a real snmpd container. Non-blocking signal that the
  # SNMP/trap paths still work end-to-end (S1/S2/S4/S5 at the engine layer).
  engine-spike:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Start snmpd test agent
        run: docker compose -f dev/snmpd/docker-compose.yml up -d --build
      - name: Wait for snmpd
        run: |
          sudo apt-get update && sudo apt-get install -y snmp
          for i in $(seq 1 15); do
            snmpget -v2c -c public -t 1 -r 1 127.0.0.1:1611 1.3.6.1.2.1.1.1.0 && break
            sleep 1
          done
      - name: Run engine spike
        run: pnpm --filter @mibbeacon/core spike

  responsive-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install browser validation runtime
        run: |
          python3 -m pip install playwright
          python3 -m playwright install --with-deps chromium
      - name: Run versioned responsive validation matrix
        env:
          MIB_BEACON_AUDIT_COMMIT: ${{ github.sha }}
          MIB_BEACON_SERVER_SECRET_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
        run: |
          pnpm --filter @mibbeacon/server build
          pnpm --filter @mibbeacon/server start > /tmp/mibbeacon-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for attempt in $(seq 1 30); do
            curl --fail --silent http://127.0.0.1:8899/ >/dev/null && break
            sleep 1
          done
          curl --fail http://127.0.0.1:8899/
          python3 dev/audit/validation-matrix.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-matrix-v1-${{ github.sha }}
          path: docs/audits/validation-matrix-v1.json
          if-no-files-found: error
