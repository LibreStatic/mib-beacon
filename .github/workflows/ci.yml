name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  # Engine spike against a real snmpd container. Non-blocking signal that the
  # SNMP/trap paths still work end-to-end (S1/S2/S4/S5 at the engine layer).
  engine-spike:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Start snmpd test agent
        run: docker compose -f dev/snmpd/docker-compose.yml up -d --build
      - name: Wait for snmpd
        run: |
          sudo apt-get update && sudo apt-get install -y snmp
          for i in $(seq 1 15); do
            snmpget -v2c -c public -t 1 -r 1 127.0.0.1:1611 1.3.6.1.2.1.1.1.0 && break
            sleep 1
          done
      - name: Run engine spike
        run: pnpm --filter @mibbeacon/core spike
