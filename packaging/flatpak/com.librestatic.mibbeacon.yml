app-id: com.librestatic.mibbeacon
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'
command: mib-beacon
separate-locales: false

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=x11
  - --device=dri

modules:
  - name: mib-beacon
    buildsystem: simple
    build-commands:
      - install -Dm755 mib-beacon /app/bin/mib-beacon
      - cp -a app /app/mib-beacon
      - install -Dm644 com.librestatic.mibbeacon.desktop /app/share/applications/com.librestatic.mibbeacon.desktop
      - install -Dm644 com.librestatic.mibbeacon.metainfo.xml /app/share/metainfo/com.librestatic.mibbeacon.metainfo.xml
      - install -Dm644 com.librestatic.mibbeacon.svg /app/share/icons/hicolor/scalable/apps/com.librestatic.mibbeacon.svg
    sources:
      # CI stages the electron-builder linux-unpacked output here. Flathub's
      # release PR replaces this local source with the immutable release URL
      # and checksum generated by scripts/prepare-flatpak-release.mjs.
      - type: dir
        path: staging
      - type: file
        path: com.librestatic.mibbeacon.desktop
      - type: file
        path: com.librestatic.mibbeacon.metainfo.xml
      - type: file
        path: com.librestatic.mibbeacon.svg
      - type: script
        dest-filename: mib-beacon
        commands:
          - exec zypak-wrapper /app/mib-beacon/mib-beacon "$@"
