app-id: com.librestatic.openmibcatalog
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'
command: open-mib-catalog
separate-locales: false

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=x11
  - --device=dri

modules:
  - name: open-mib-catalog
    buildsystem: simple
    build-commands:
      - install -Dm755 open-mib-catalog /app/bin/open-mib-catalog
      - cp -a app /app/open-mib-catalog
      - install -Dm644 com.librestatic.openmibcatalog.desktop /app/share/applications/com.librestatic.openmibcatalog.desktop
      - install -Dm644 com.librestatic.openmibcatalog.metainfo.xml /app/share/metainfo/com.librestatic.openmibcatalog.metainfo.xml
      - install -Dm644 com.librestatic.openmibcatalog.svg /app/share/icons/hicolor/scalable/apps/com.librestatic.openmibcatalog.svg
    sources:
      # CI stages the electron-builder linux-unpacked output here. Flathub's
      # release PR replaces this local source with the immutable release URL
      # and checksum generated by scripts/prepare-flatpak-release.mjs.
      - type: dir
        path: staging
      - type: file
        path: com.librestatic.openmibcatalog.desktop
      - type: file
        path: com.librestatic.openmibcatalog.metainfo.xml
      - type: file
        path: com.librestatic.openmibcatalog.svg
      - type: script
        dest-filename: open-mib-catalog
        commands:
          - exec zypak-wrapper /app/open-mib-catalog/open-mib-catalog "$@"
