name: mib-beacon

services:
  mibbeacon-server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    init: true
    network_mode: host
    environment:
      MIB_BEACON_SERVER_HOST: 0.0.0.0
      MIB_BEACON_SERVER_PORT: ${MIB_BEACON_SERVER_PORT:-8899}
      MIB_BEACON_SERVER_DATA: /data
      MIB_BEACON_SERVER_SECRET_KEY: "${MIB_BEACON_SERVER_SECRET_KEY:?Set MIB_BEACON_SERVER_SECRET_KEY to an openssl rand -base64 32 value}"
    volumes:
      - mibbeacon-server-data:/data
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:'+process.env.MIB_BEACON_SERVER_PORT).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  mibbeacon-server-data:
