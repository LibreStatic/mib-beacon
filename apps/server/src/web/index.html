<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>MIB Beacon</title>
    <script>
      (() => {
        const systemTheme = window.matchMedia?.('(prefers-color-scheme: dark)').matches
          ? 'dark'
          : 'light';
        let preference = 'system';
        try {
          preference = localStorage.getItem('mibbeacon:theme') ?? 'system';
        } catch {
          // Browser storage is optional for the static bootstrap shell.
        }
        const bootTheme = preference === 'light' || preference === 'dark' ? preference : systemTheme;
        document.documentElement.dataset.bootTheme = bootTheme;
        document.documentElement.style.colorScheme = bootTheme;
      })();
    </script>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      html {
        background: #f4f6f9;
      }
      html[data-boot-theme='dark'] {
        background: #0b0e13;
      }
      #root {
        display: flex;
        height: 100%;
        min-height: 0;
        position: relative;
      }
      #app-root {
        display: flex;
        flex: 1;
        min-height: 0;
      }
      .boot-screen {
        position: absolute;
        inset: 0;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        opacity: 1;
        transition: opacity 120ms ease-out;
        font: 700 13px/1.3 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .boot-screen--exit {
        opacity: 0;
      }
      html[data-boot-theme='light'] .boot-screen {
        background: #f4f6f9;
        color: #4b5565;
      }
      html[data-boot-theme='dark'] .boot-screen {
        background: #0b0e13;
        color: #aeb8c8;
      }
      .boot-logo {
        width: 104px;
        height: 104px;
        animation: boot-pulse 1.2s ease-in-out infinite;
      }
      @keyframes boot-pulse {
        0%,
        100% {
          opacity: 0.42;
          transform: scale(0.96);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-logo {
          animation: none;
        }
        .boot-screen {
          transition: none;
        }
      }
      #app-bottom-navigation {
        flex-shrink: 0;
        padding-bottom: max(10px, env(safe-area-inset-bottom)) !important;
      }
      @supports (height: 100dvh) {
        #root {
          height: 100dvh;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-screen" role="status" aria-live="polite">
        <img class="boot-logo" src="/favicon.svg" alt="" />
        <span>Loading MIB Beacon</span>
      </div>
    </div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
